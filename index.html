<!DOCTYPE html>
<html lang="pt">
<head>

    <title>Loja de Contas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <button class="btn-menu"> ☰</button>
        <span class="carrinho-icone">🛒 <span id="contador">0</span></span>
                <div class="menu-links">
                    <button class="fechar-menu">X</button>
                     <a href="#" onclick="filtrarCategoria('todos')">Início</a>
                     <a href="#" onclick="filtrarCategoria('conta')">Contas</a>
                     <a href="#" onclick="filtrarCategoria('gamepass')">Gamepass</a>
                </div>

<header>
        <h1>🎮 Loja de conta e Gamepass</h1>

<div class="busca">

</div>

    <main class="produtos">

            <button id="btn-pagar"> Finalizar a compra</button>
